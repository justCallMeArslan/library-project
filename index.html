<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Library</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>

</head>

<body>
    <div class="myCollection">
        <table>
            <thead>
                <tr>
                    <th colspan="7">Personal book collection organizer</th>
                </tr>
                <tr>
                    <th>Boook ID</th>
                    <th>Title</th>
                    <th>Author</th>
                    <th>N of pages</th>
                    <th>Notes/Review</th>
                    <th>Read/Unread</th>
                    <th>Remove book</th>
                </tr>
            </thead>
            <tbody class="bodyMyCol">
                <tr>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                    <td>&nbsp;</td>
                </tr>
            </tbody>
        </table>
    </div>
    <div>
        <button class="addBookBtn">Add new book to the collection</button>
        <dialog class="formPopUp">
            <form class="form-container">
                <h3>Fill up form with book information</h3>
                <label for="title">Title</label>
                <input type="text" name="title" id="formTitle">
                <label for="author">Author</label>
                <input type="text" name="author" id="formAuthor">
                <label for="numOfPages">Number of pages</label>
                <input type="tel" name="numOfPages" id="formNumOfPages">
                <label for="notesReview">Notes/Review</label>
                <input type="text" name="notesReview" id="formNotesReview">
                <button type="submit">Submit</button>
                <button type="button" class="closeModal">Close</button>
            </form>
        </dialog>
    </div>
</body>

</html>
